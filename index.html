<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VINTHEX Voting</title>
    <style>
        :root { --bg: #030712; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); --primary: #8b5cf6; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #030712); color: var(--text); overflow: hidden; }

        #splash { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #030712; transition: opacity 0.8s ease; }
        .logo { font-size: 2rem; font-weight: 800; color: var(--primary); }

        #app { width: 100%; height: 100%; position: relative; display: none; }
        .view { position: absolute; width: 100%; height: 100%; padding: 20px; overflow-y: auto; display: none; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 16px; }
        #modal { position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .modal-content { background: #111827; width: 90%; max-height: 80vh; overflow-y: auto; padding: 30px; border-radius: 30px; border: 1px solid var(--border); }
        .tab-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; }
        
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 15px; }
        .btn-action { width: 100%; padding: 12px; background: var(--primary); color: white; margin-top: 10px; }
        .btn-danger { background: #ef4444; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash"><div class="logo">VINTHEX</div></div>

    <div id="app">
        <div id="view-home" class="view active">
            <h1 style="margin-top: 10px;">Kandidat</h1>
            <div id="card-list"></div>
        </div>

        <div id="view-admin" class="view">
            <h1>Admin Dashboard</h1>
            <div id="admin-data" class="glass-card"></div>
            <button class="btn-action" onclick="alert('Silakan ambil screenshot layar Anda sekarang!')">Cetak (Screenshot)</button>
            <button class="btn-action btn-danger" onclick="resetVote()">Reset Semua Suara</button>
        </div>

        <div class="tab-bar">
            <div onclick="showView('view-home')">🏠</div>
            <div onclick="checkAdmin()">⚙️</div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div id="modal-desc" style="line-height: 1.6; font-size: 14px; opacity: 0.9;"></div>
            <button id="btn-vote" class="btn-action" onclick="performVote()">VOTE SEKARANG</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="width: 100%; padding: 10px; margin-top: 10px; background: transparent; color: #888;">Batal</button>
        </div>
    </div>

    <script>
        let defaultData = [
            { id: 1, nama: "Ell", suara: 0, detail: "Umur: 15<br>Bergabung: Beberapa hari lalu<br>Mengapa ingin menjadi petinggi: Ingin menjaga dan memperbesar marga<br>Kelebihan: Jago ngedit, sering push mem<br>Tanggung jawab: Menjaga sesuatu yang dilakukan bersama<br>Jika ada yang melanggar: Menegur, jika mengulang di-kick<br>Jika terjadi perdebatan: Melerai dan membicarakan baik-baik<br>Teman dekat melanggar: Tetap menasihati agar lebih baik<br>Jika owner offline: Membantu melerai keributan<br>Aktif harian: Satu hari full<br>Ramai & kondusif: Tag all dan membuat topik baru<br>Pengalaman admin: Pernah, seru dan lancar<br>Kenapa memilihmu: Mampu menjadi petinggi yang baik<br>Kritik & saran: Siap menerima<br>Peraturan: Siap menaati<br>Komitmen: Meramaikan GC dan push member<br>Pesan: Apapun keputusan kalian, saya terima." },
            { id: 2, nama: "Kalzz", suara: 0, detail: "Umur: 17<br>Bergabung: 3 tahun<br>Mengapa ingin menjadi petinggi: Biar ada kerjaan seblink<br>Kelebihan: Kuasa api<br>Kekurangan: Ujian mtk<br>Tanggung jawab: Bekerjasama<br>Jika ada yang melanggar: Kick<br>Jika terjadi perdebatan: Nasehat<br>Teman dekat melanggar: Nasehat<br>Jika owner offline: Lapor<br>Aktif harian: Setiap hari pulang sekolah<br>Ramai & kondusif: Seblink<br>Pengalaman admin: Best<br>Kenapa memilihmu: Karna gua ada kuasa api<br>Kritik & saran: Iya<br>Peraturan: Ya<br>Komitmen: Bangga<br>Pesan: Harap admin tim selek bisa terima gua ya." },
            { id: 3, nama: "Kyyy", suara: 0, detail: "Umur: 15<br>Bergabung: Belum ada 1 bulan<br>Mengapa ingin menjadi petinggi: Ingin membangkitkan GC<br>Kelebihan: Suka yappink, joks, dan bot zekais<br>Kekurangan: Menjadi lebih baik dalam membimbing member<br>Tanggung jawab: Melakukan pertanggungjawaban sendiri<br>Jika ada yang melanggar: Kasih hukuman/kick<br>Jika terjadi perdebatan: Tutup GC, nasehati, jika keterlaluan kick<br>Teman dekat melanggar: Iya, karena dia melanggar aturan<br>Jika owner offline: Selesaikan<br>Aktif harian: Tergantung<br>Ramai & kondusif: Suruh nimb<br>Pengalaman admin: Founder, membimbing member jadi lebih baik<br>Kenapa memilihmu: Karena aku bertanggung jawab<br>Kritik & saran: Siap<br>Peraturan: Siap<br>Komitmen: Menjadi lebih ramah<br>Pesan: Smoga keterima, sukses selalu." },
            { id: 4, nama: "Cipa", suara: 0, detail: "Umur: 14<br>Bergabung: baru ajah mwhehe<br>Mengapa ingin menjadi petinggi GC?: eumm kqarna pengen ajah ngrasain jadi petinggi di grup rame<br>Apa kelebihan yang kamu miliki?: kelebihan akqu¿eum bisa renang😎+seblink<br>Apa kekurangan yang sedang kamu perbaiki?: eum, baru nyembuhin trauma wokwok😎<br>Apa arti tanggung jawab menurutmu?: kesadaran untuk memenuhi kewajiban dan kesanggupan menanggung segala konsekuensi dari tindakan atau keputusan yang kita ambil<br>Jika ada yang melanggar?: akan menegur anggota tersebut agar tidak mengulangi kesalahan<br>Jika terjadi perdebatan besar di GC?: akan menasehati agar saling memaafkan 1 sama lain<br>Jika teman dekatmu melanggar aturan?: eum, akan menegur nya biar lebih menjadi baik<br>Jika owner sedang offline?: akan menjaga gc dan akan menasehati mem tersebut<br>Aktif harian: setiap hari(kec pas sholat/mandi)<br>Ramai & kondusif: membuat topic di gc<br>Pengalaman admin: ga pernah<br>Mengapa kami harus memilihmu?: -<br>Kritik & saran: siap<br>Peraturan: siap<br>Komitmen: akan menjaga gc setiap waktu(kec pas sholat, makan, mandi)<br>Pesan: semoga saya di terima, dan menjaga gc lebih baik&kondusif" },
            { id: 5, nama: "Melzha", suara: 0, detail: "Umur: 17<br>Bergabung: baru masuk<br>Mengapa ingin menjadi petinggi GC?: ingin menambah pengalaman dan ingin menjadi seorang yang bertanggung jawab<br>Kelebihan: aku bisa push mem banyak<br>Kekurangan: menjadi emosi saat marah<br>Tanggung jawab: menurut aku kesadaran dan kesediaan seseorang untuk menanggung segala risiko, akibat, atau kewajiban dari tindakan dan keputusan yang telah diambil<br>Jika ada yang melanggar: dari prinsip aku sendiri, jika melanggar aturan masih di beri peringatan 1-2 jika lebih dari itu maka langsung di kick<br>Jika terjadi perdebatan: dibicarakan oleh pihak yang membuat keributan dan mampu buat tenangin pihak yang membuat perdebatan<br>Teman dekat melanggar: yah, karna setiap aturan yang sudah di terapkan harus tetap di patuhi tidak ada toleransi mau itu temen deket bagaimana pun.<br>Jika owner offline: aku harus bisa untuk membuat mereka tenang dengan cara aku sendiri contoh non izinkan kirim cht di gc dan menjelaskan agar anggota tidak membuat keributan lagi.<br>Aktif harian: insyaallah 24 jam (kalau sibuk masih sempat untuk buka hp).<br>Ramai & kondusif: aku akan membuat/mengajak anggota buat bersenang' dan tidak membuat mereka merass tidak nyaman.<br>Pengalaman admin: pernah hanya menjadi adm open member saja, karna aku lebih senang bisa membuat gc ramai.<br>Mengapa kami harus memilihmu: aku ingin skli memiliki jabatan yang lebih tinggi dan petinggi itu juga mengajar aku untuk selalu bertanggung jawab.<br>Kritik & saran: sangat siap<br>Peraturan: sangat siap<br>Komitmen: aku akan memimpin dengan integritas tinggi dan tegas.<br>Pesan: aku ingin sekali menambah pengalaman untuk menjadi pemimpin yang tegas dan bertanggung jawab dalm tugas yang telah di terapkan" }
        ];

        let storedData = JSON.parse(localStorage.getItem('kandidatData'));
        let kandidat;
        
        if (storedData && storedData.length === defaultData.length) {
            kandidat = storedData;
        } else if (storedData && storedData.length < defaultData.length) {
            // Gabungkan suara lama dengan daftar kandidat baru
            kandidat = defaultData.map(dk => {
                let found = storedData.find(s => s.id === dk.id);
                if (found) dk.suara = found.suara;
                return dk;
            });
            localStorage.setItem('kandidatData', JSON.stringify(kandidat));
        } else {
            kandidat = defaultData;
        }

        function saveData() { localStorage.setItem('kandidatData', JSON.stringify(kandidat)); renderAdmin(); }
        
        function renderAdmin() {
            let sorted = [...kandidat].sort((a, b) => b.suara - a.suara);
            let total = kandidat.reduce((a,b) => a + b.suara, 0);
            document.getElementById('admin-data').innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead><tr style="border-bottom:1px solid var(--border)"><th style="padding:10px;text-align:left">Rank</th><th style="padding:10px;text-align:left">Nama</th><th style="padding:10px;text-align:center">Suara</th></tr></thead>
                    <tbody>${sorted.map((k, i) => `<tr style="border-bottom:1px solid var(--glass)"><td style="padding:10px">${i+1}</td><td style="padding:10px">${k.nama}</td><td style="padding:10px;text-align:center">${k.suara}</td></tr>`).join('')}</tbody>
                </table>
                <div style="margin-top:10px; font-weight:bold">Total Suara: ${total}</div>`;
        }

        function resetVote() {
            if(confirm("Yakin ingin mereset semua suara?")) {
                kandidat.forEach(k => k.suara = 0);
                localStorage.removeItem('hasVoted');
                saveData();
                alert("Berhasil direset!");
            }
        }

        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; document.getElementById('app').style.display = 'block'; }, 800); }, 2000);
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function openModal(id) {
            let k = kandidat.find(x => x.id === id);
            document.getElementById('modal-title').innerText = k.nama;
            document.getElementById('modal-desc').innerHTML = k.detail;
            document.getElementById('modal').style.display = 'flex';
            window.selectedId = id;
        }
        function performVote() {
            if(localStorage.getItem('hasVoted')) { alert("Anda sudah melakukan vote!"); return; }
            kandidat.find(x => x.id === window.selectedId).suara++;
            saveData(); localStorage.setItem('hasVoted', 'true');
            alert("Vote berhasil!"); document.getElementById('modal').style.display = 'none';
        }
        function checkAdmin() {
            if(prompt("Password Admin:") === "VINTHEXADMIN") { showView('view-admin'); renderAdmin(); } else { alert("Salah!"); }
        }

        const list = document.getElementById('card-list');
        kandidat.forEach(item => { list.innerHTML += `<div class="glass-card" onclick="openModal(${item.id})"><h3>${item.nama}</h3></div>`; });
    </script>
</body>
</html>
